# @package _group_

common:
  fp16: true
  log_format: json
  log_interval: 50
  tensorboard_logdir: /hy-tmp/exp/eat/logs/shipsear/tb
  fp16_no_flatten_grads: true
  seed: 42

checkpoint:
  save_interval: 1
  save_interval_updates: 2000
  keep_interval_updates: 2
  no_epoch_checkpoints: true
  best_checkpoint_metric: accuracy
  maximize_best_checkpoint_metric: true
  save_dir: /hy-tmp/exp/eat/runs/shipsear_baseline

task:
  _name: mae_image_classification
  data: /hy-tmp/exp/eat/manifests/shipsear
  downsr_16hz: true
  audio_mae: true
  target_length: 1024
  roll_aug: true
  noise: false
  h5_format: false

  AS2M_finetune: false
  spcv1_finetune: false
  spcv2_eval: false
  esc50_eval: true

dataset:
  num_workers: 6
  batch_size: 48
  skip_invalid_size_inputs_valid_test: true
  required_batch_size_multiple: 2
  train_subset: train
  valid_subset: valid

distributed_training:
  distributed_world_size: 1
  ddp_backend: c10d

criterion:
  _name: model
  log_keys:
    - correct

optimization:
  max_update: 8000
  lr: [0.00005]

optimizer:
  _name: composite
  dynamic_groups: true
  groups:
    default:
      lr_float: 0.00005
      optimizer:
        _name: adam
        adam_betas: [0.9,0.95]
        weight_decay: 0.05
      lr_scheduler:
        _name: cosine
        warmup_updates: 800
        min_lr: 1e-6

lr_scheduler: pass_through

model:
  _name: mae_image_classification
  mixup: 0.0
  mixup_prob: 0.0
  model_path: /hy-tmp/model_zoo/eat_checkpoints/EAT-base_epoch30_pt.pt
  audio_mae: true
  num_classes: 12
  specaug: true
  mask_ratio: 0.2
  prediction_mode: PredictionMode.CLS_TOKEN

  spcv2_eval: false
  esc50_eval: true
  target_length: 1024

  label_smoothing: 0.1
  freqm: 25
  timem: 200
